# ===================================================================
# ADCRS — Ambiente Digital de Criticidade e Resiliência Setorial
# Docker Compose para desenvolvimento local
# ===================================================================
# Uso:
#   docker compose up -d          → sobe tudo
#   docker compose logs -f        → acompanha logs
#   docker compose down           → derruba
#   docker compose down -v        → derruba e apaga volumes
# ===================================================================

services:

  # ----------------------------------------------------------------
  # Banco de dados PostgreSQL 16 + PostGIS
  # ----------------------------------------------------------------
  db:
    image: postgis/postgis:16-3.4
    container_name: adcrs-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-adcrs}
      POSTGRES_USER: ${POSTGRES_USER:-adcrs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-adcrs_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-adcrs}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - adcrs-net

  # ----------------------------------------------------------------
  # Backend FastAPI
  # ----------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: ../infra/docker/backend.Dockerfile
    container_name: adcrs-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-adcrs}:${POSTGRES_PASSWORD:-adcrs_dev}@db:5432/${POSTGRES_DB:-adcrs}
    volumes:
      - ./backend:/app
      - ./rules:/app/rules:ro
      - ./exports:/var/adcrs/exports
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - adcrs-net

  # ----------------------------------------------------------------
  # Frontend React / Vite
  # ----------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: ../infra/docker/frontend.Dockerfile
    container_name: adcrs-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0 --port 3000
    networks:
      - adcrs-net

  # ----------------------------------------------------------------
  # Adminer — interface de banco de dados (desenvolvimento)
  # ----------------------------------------------------------------
  adminer:
    image: adminer:4.8.1
    container_name: adcrs-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - adcrs-net
    profiles:
      - dev

  # ----------------------------------------------------------------
  # Redis — cache e rate limiting
  # ----------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: adcrs-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - adcrs-net

  # ----------------------------------------------------------------
  # Worker para exports Qlik e tarefas agendadas
  # ----------------------------------------------------------------
  worker:
    build:
      context: ./backend
      dockerfile: ../infra/docker/backend.Dockerfile
    container_name: adcrs-worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-adcrs}:${POSTGRES_PASSWORD:-adcrs_dev}@db:5432/${POSTGRES_DB:-adcrs}
    volumes:
      - ./backend:/app
      - ./rules:/app/rules:ro
      - ./exports:/var/adcrs/exports
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: python -m app.worker
    networks:
      - adcrs-net

volumes:
  pgdata:
    name: adcrs_pgdata
  redisdata:
    name: adcrs_redisdata

networks:
  adcrs-net:
    name: adcrs-net
    driver: bridge
